  - {type: variant, offset: 6116, length: 50, content: 「當何名」下，第二、辨名空無所有。夫條散難究，本一易尋，會宗領旨，宜正其名。文有四叚，初、名字空，二、受、持福多，三、信受行深，四、佛述。, 甲: （（爾時須菩提白佛言世尊當何名此經我等云何奉持））經二十一字}
